<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SRMS Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          rel="stylesheet">

    <style>

        body{
            height:100vh;
            background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
        }

        .login-card{
            width:420px;
            border:none;
            border-radius:20px;
            backdrop-filter: blur(15px);
            background:rgba(255,255,255,0.1);
            box-shadow:0 8px 30px rgba(0,0,0,0.3);
            color:white;
        }

        .form-control,
        .form-select{
            background:rgba(255,255,255,0.15);
            border:none;
            color:white;
        }

        .form-select option{
    color:black;
}

        .form-control::placeholder{
            color:#d1d5db;
        }

        .form-control:focus,
        .form-select:focus{
            box-shadow:none;
            border:1px solid #60a5fa;
        }

        .btn-login{
            background:#2563eb;
            border:none;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#1d4ed8;
            transform:translateY(-2px);
        }

    </style>

</head>

<body>

<div class="card login-card p-4">

    <div class="text-center mb-4">

        <i class="fa-solid fa-graduation-cap fa-3x mb-3 text-info"></i>

        <h2 class="fw-bold">
            SRMS Portal
        </h2>

        <p class="text-light small">
            Student Result Management System
        </p>

    </div>

    {% with messages = get_flashed_messages() %}
        {% if messages %}

            <div class="alert alert-danger text-center py-2">

                {{ messages[0] }}

            </div>

        {% endif %}
    {% endwith %}

    <form action="/login" method="POST">

        <div class="mb-3">

            <label class="small mb-1">
                Username / Student ID
            </label>

            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Enter username"
                   required>

        </div>

        <div class="mb-3">

            <label class="small mb-1">
                Password
            </label>

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter password"
                   required>

        </div>

        <div class="mb-4">

            <label class="small mb-1">
                Login Role
            </label>

            <select name="role"
                    class="form-select">

                <option value="student">
                    Student
                </option>

                <option value="admin">
                    Admin
                </option>

            </select>

        </div>

        <button type="submit"
                class="btn btn-login text-white w-100 py-2 fw-bold">

            Login

        </button>

    </form>

</div>

</body>

</html>
