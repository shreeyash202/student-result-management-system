<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SRMS Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="card p-4 w-100" style="max-width: 450px;">

        <h1 class="text-center text-primary fw-bold mb-4">
            Student Result Management System
        </h1>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input type="password"
                       name="password"
                       class="form-control"
                       required>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Role
                </label>

                <select name="role"
                        class="form-select"
                        required>

                    <option value="admin">
                        Admin
                    </option>

                    <option value="student">
                        Student
                    </option>

                </select>

            </div>

            <button type="submit"
                    class="btn btn-primary w-100">

                Login

            </button>

        </form>

    </div>

</div>

</body>
</html>
