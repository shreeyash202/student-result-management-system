<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Marks Entry</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

body{
    background:#f1f5f9;
}

.card{
    border:none;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="card p-5"
         style="width:600px;">

        <h2 class="text-center fw-bold text-primary mb-4">

            Enter Student Marks

        </h2>

        <p class="text-center text-muted mb-4">

            Student ID:
            <strong>{{ student_id }}</strong>

        </p>

        <form action="/admin/enter_marks/{{ student_id }}"
              method="POST">

            <input type="number"
                   name="maths"
                   class="form-control mb-3"
                   placeholder="Maths Marks"
                   min="0"
                   max="100"
                   required>

            <input type="number"
                   name="dbms"
                   class="form-control mb-3"
                   placeholder="DBMS Marks"
                   min="0"
                   max="100"
                   required>

            <input type="number"
                   name="python"
                   class="form-control mb-3"
                   placeholder="Python Marks"
                   min="0"
                   max="100"
                   required>

            <input type="number"
                   name="os"
                   class="form-control mb-3"
                   placeholder="Operating Systems Marks"
                   min="0"
                   max="100"
                   required>

            <input type="number"
                   name="java"
                   class="form-control mb-4"
                   placeholder="Java Marks"
                   min="0"
                   max="100"
                   required>

            <div class="row">

                <div class="col-6">

                    <a href="/dashboard"
                       class="btn btn-outline-secondary w-100">

                        Back

                    </a>

                </div>

                <div class="col-6">

                    <button type="submit"
                            class="btn btn-primary w-100">

                        Save Marks

                    </button>

                </div>

            </div>

        </form>

    </div>

</div>

</body>

</html>
